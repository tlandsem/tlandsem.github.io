{% extends 'base.html' %}

{% block title %}Trine Landsem - Contact{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 60px auto; padding: 0 24px;">
  <div style="background: rgba(255,255,255,0.75); border: 1px solid rgba(20,180,120,0.3); border-radius: 12px; padding: 40px; backdrop-filter: blur(8px);">
    
    <h1 style="color: #0f4c35; font-size: 22px; letter-spacing: 0.08em; margin-bottom: 24px;">// CONTACT</h1>

    <form method="POST" action="https://formspree.io/f/xdalagwr">

      <label style="display: block; color: #0f4c35; font-size: 13px; letter-spacing: 0.08em; margin-bottom: 6px;">NAME</label>
      <input type="text" name="navn" required
        style="width: 100%; padding: 10px 14px; margin-bottom: 20px; border: 1px solid rgba(20,180,120,0.3); border-radius: 8px; background: rgba(255,255,255,0.8); font-family: 'Rajdhani', sans-serif; font-size: 15px; color: #0f4c35; outline: none;">

      <label style="display: block; color: #0f4c35; font-size: 13px; letter-spacing: 0.08em; margin-bottom: 6px;">E-MAIL</label>
      <input type="email" name="epost" required
        style="width: 100%; padding: 10px 14px; margin-bottom: 20px; border: 1px solid rgba(20,180,120,0.3); border-radius: 8px; background: rgba(255,255,255,0.8); font-family: 'Rajdhani', sans-serif; font-size: 15px; color: #0f4c35; outline: none;">

      <label style="display: block; color: #0f4c35; font-size: 13px; letter-spacing: 0.08em; margin-bottom: 6px;">MESSAGE</label>
      <textarea name="melding" rows="6" required
        style="width: 100%; padding: 10px 14px; margin-bottom: 24px; border: 1px solid rgba(20,180,120,0.3); border-radius: 8px; background: rgba(255,255,255,0.8); font-family: 'Rajdhani', sans-serif; font-size: 15px; color: #0f4c35; outline: none; resize: vertical;"></textarea>

      <button type="submit"
        style="width: 100%; padding: 12px; background: rgba(20,180,120,0.15); border: 1px solid rgba(20,180,120,0.4); border-radius: 8px; color: #0f4c35; font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 0.08em; cursor: pointer;">
        SEND MESSAGE
      </button>

    </form>
  </div>
</div>
{% endblock %}
