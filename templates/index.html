{% extends 'base.html' %}

{% block title %}Trine Landsem - Home{% endblock %}

{% block content %}
<style>
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(28px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .hero-box {
    animation: fadeUp 3.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: 0.3s;
    opacity: 0;
  }
</style>

<div style="display: flex; align-items: center; justify-content: center; height: 80vh;">
  <div class="hero-box" style="background: rgba(8,20,30,0.75); border: 1px solid rgba(0,200,160,0.2); border-radius: 12px; padding: 28px 48px; text-align: center; backdrop-filter: blur(8px);">
    <h1 style="color: #00e5b3; font-size: 30px; letter-spacing: 0.08em; text-transform: uppercase;">Trine Landsem // 2026</h1>
    <p style="color: rgba(200,240,230,0.75); font-size: 18px; margin-top: 6px; letter-spacing: 0.12em;">[ WHERE COMPASSION MEETS CYBERSECURITY. ]</p>
  </div>
</div>
{% endblock %}
